<div class="modal-overlay" id="new-task-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✨ Create New Task</div>
      <button class="close-btn" onclick="closeModal('new-task-modal')">✕</button>
    </div>
    <form method="POST" action="/tasks/new">
      <input type="hidden" name="redirect" value="{{ redirect_to or 'tasks' }}">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" name="title" class="form-control" placeholder="What needs to be done?" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" placeholder="Add more details…" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Status</label>
            <select name="status" class="form-control">
              <option value="todo">📌 To Do</option>
              <option value="in_progress">⚡ In Progress</option>
              <option value="review">👁 Review</option>
              <option value="done">✅ Done</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-control">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
              <option value="critical">🔥 Critical</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Deadline</label>
            <input type="datetime-local" name="deadline" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Est. Hours</label>
            <input type="number" name="estimated_h" class="form-control" placeholder="0" min="0" step="0.5">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Project</label>
            <select name="project_id" class="form-control">
              <option value="">— None —</option>
              {% for p in projects %}
              <option value="{{ p.id }}" {% if current_project and current_project.id==p.id %}selected{% endif %}>{{ p.emoji }} {{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Assign To</label>
            <select name="assignee_id" class="form-control">
              {% for m in members %}
              <option value="{{ m.id }}" {% if m.id==user.id %}selected{% endif %}>{{ m.avatar }} {{ m.username }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Story Points</label>
            <select name="story_points" class="form-control">
              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="5" selected>5</option>
              <option value="8">8</option><option value="13">13</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Tags</label>
            <input type="text" name="tags" class="form-control" placeholder="design, backend, urgent">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('new-task-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Create Task</button>
      </div>
    </form>
  </div>
</div>
