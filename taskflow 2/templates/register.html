<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow – Register</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0b0f;--surface:#12141a;--border:#2a2d38;--accent:#7c6dfa;--accent2:#a594f9;
  --accent-glow:rgba(124,109,250,0.3);--pink:#f471b5;--text:#f0f0f8;--text2:#9ca3c8;--text3:#5a5f7a;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:float 8s ease-in-out infinite;}
.orb-1{width:500px;height:500px;background:var(--pink);bottom:-100px;left:-100px;}
.orb-2{width:400px;height:400px;background:var(--accent);top:-100px;right:-100px;animation-delay:-4s;}
@keyframes float{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,15px);}}
.auth-card{
  position:relative;z-index:1;background:rgba(18,20,26,0.9);
  border:1px solid rgba(124,109,250,0.2);border-radius:20px;
  width:440px;max-width:95vw;padding:48px 40px;
  backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:22px;}
.logo-text{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.logo-text span{background:linear-gradient(90deg,var(--accent2),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px;}
.subtitle{color:var(--text2);margin-bottom:32px;font-size:14px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;margin-bottom:6px;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;}
.form-control{width:100%;background:rgba(26,28,36,0.8);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);outline:none;font-size:14px;font-family:'DM Sans',sans-serif;transition:.2s;}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.form-control::placeholder{color:var(--text3);}
.btn-primary{width:100%;padding:13px;border:none;border-radius:10px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#9b8dff);color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;transition:.2s;margin-top:8px;box-shadow:0 4px 24px var(--accent-glow);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--accent-glow);}
.switch-link{text-align:center;margin-top:24px;font-size:13px;color:var(--text2);}
.switch-link a{color:var(--accent2);font-weight:600;text-decoration:underline;}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="auth-card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text"><span>Task</span>Flow</div>
  </div>
  <h1>Create account</h1>
  <p class="subtitle">Get started with TaskFlow for free</p>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="coolname" required>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
    </div>
    <button type="submit" class="btn-primary">Create Account →</button>
  </form>
  <div class="switch-link">Already have an account? <a href="/login">Sign in</a></div>
</div>
</body>
</html>
