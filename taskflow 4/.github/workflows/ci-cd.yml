# ──────────────────────────────────────────────────────────────────
#  TaskFlow — GitHub Actions CI/CD Pipeline
#
#  Triggers:
#    • Every push to main or develop
#    • Every Pull Request targeting main
#
#  Pipeline stages:
#    test  →  build  →  push (image to GHCR)  →  deploy (to K8s)
# ──────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub Container Registry image name
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/taskflow
  PYTHON_VERSION: "3.11"

jobs:

  # ────────────────────────────────────────────────────────
  #  JOB 1 — Run Tests
  # ────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip           # Cache pip downloads between runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests.py -v --tb=short
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key

      - name: Upload test results
        if: always()           # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/


  # ────────────────────────────────────────────────────────
  #  JOB 2 — Build & Push Docker Image
  #  Only runs on push to main (not on PRs)
  # ────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                # Only run if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write          # Needed to push to GHCR

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables multi-platform builds and build cache

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is automatically provided by GitHub — no setup needed

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with git SHA: ghcr.io/user/taskflow:abc1234
            type=sha,prefix=sha-,format=short
            # Tag latest on main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with semver if you push a git tag like v1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build for both AMD64 (servers) and ARM64 (Apple Silicon / Raspberry Pi)
          platforms: linux/amd64,linux/arm64

      - name: Print image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"


  # ────────────────────────────────────────────────────────
  #  JOB 3 — Deploy to Kubernetes
  #  Only runs after a successful image build on main
  # ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production    # Requires manual approval if configured in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl (connect to your cluster)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
        # KUBECONFIG secret: base64 encode your kubeconfig file and store in
        # GitHub → Settings → Secrets → KUBECONFIG

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Update image tag in deployment
        run: |
          # Get the SHA tag from the previous job
          IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/taskflow:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Deploying image: $IMAGE_TAG"

          # Patch the deployment with the new image
          kubectl set image deployment/taskflow-deployment \
            taskflow=$IMAGE_TAG \
            -n taskflow

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/taskflow-deployment \
            -n taskflow \
            --timeout=180s

      - name: Verify deployment health
        run: |
          kubectl get pods -n taskflow
          kubectl get services -n taskflow

      - name: Run post-deploy smoke test
        run: |
          # Wait a moment for pods to be fully ready
          sleep 10
          # Port-forward and test health endpoint
          kubectl port-forward svc/taskflow-service 8080:80 -n taskflow &
          sleep 3
          curl -f http://localhost:8080/health || echo "Health check failed"


  # ────────────────────────────────────────────────────────
  #  JOB 4 — Notify on failure (optional)
  # ────────────────────────────────────────────────────────
  notify-failure:
    name: 📢 Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed on branch ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          # In a real project, you'd send to Slack/email here:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          #   -d '{"text":"TaskFlow deploy failed on main!"}'
